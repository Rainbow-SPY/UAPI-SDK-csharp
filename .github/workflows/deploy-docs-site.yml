name: Deploy Docs Site

on:
  push:
    branches:
      - master
    paths:
      - ".github/workflows/deploy-docs-site.yml"
      - "docs-site/**"
      - "README.md"
      - "UAPI/docs/**"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: docs-site-publish
  cancel-in-progress: true

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: docs-site/package-lock.json

      - name: Install dependencies
        working-directory: docs-site
        run: npm ci

      - name: Build docs site
        working-directory: docs-site
        run: npm run build

      - name: Publish static files to docs/
        run: |
          rm -rf docs
          mkdir -p docs
          cp -R docs-site/dist/. docs/
          touch docs/.nojekyll

      - name: Commit published site
        run: |
          git add -A docs
          if git diff --cached --quiet; then
            echo "No docs changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Deploy docs site [skip ci]"
          git push
